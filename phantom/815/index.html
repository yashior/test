<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>LINEAGE 掉落查詢</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      border-radius: 5px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      background-color: white;
      color: black;
      width: 90%;
    }

    th, td {
      padding: 8px 12px;
      border: 1px solid #ccc;
    }

    th {
      background-color: #eee;
    }

    #result {
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>LINEAGE 掉落查詢</h1>
  <input type="text" id="keyword" placeholder="請輸入關鍵字 (物品或怪物)">
  <button onclick="search()">查詢</button>

  <div id="result"></div>

  <script>
const client = supabase.createClient(
  "https://ducspermqjjfxoghavmf.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1Y3NwZXJtcWpqZnhvZ2hhdm1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NDE4NTEsImV4cCI6MjA4ODUxNzg1MX0.uVFVECd76WMzcyqcmnAk2I9uBIuaE54Wgl_pePHqKd4"
);

async function search() {
  const keyword = document.getElementById("keyword").value.trim();
  const resultDiv = document.getElementById("result");

  if (!keyword) {
    resultDiv.innerHTML = "<p>請輸入關鍵字</p>";
    return;
  }

  resultDiv.innerHTML = "查詢中...";

  const { data, error } = await client
    .from("droplist")
    .select("*")
    .or(`mobId.ilike.%${keyword}%,itemId.ilike.%${keyword}%`);

  if (error) {
    resultDiv.innerHTML = "<pre style='color:red;'>" + JSON.stringify(error, null, 2) + "</pre>";
    return;
  }

  if (!data || data.length === 0) {
    resultDiv.innerHTML = "<p>查無資料</p>";
    return;
  }

  let html = "<table border='1'><tr><th>怪物</th><th>物品</th><th>掉落率</th><th>備註</th></tr>";

  data.forEach(row => {
    html += `<tr>
      <td>${row.mobId}</td>
      <td>${row.itemId}</td>
      <td>${(Number(row.chance) / 10000).toFixed(2)}%</td>
      <td>${row.note ?? ""}</td>
    </tr>`;
  });

  html += "</table>";

  resultDiv.innerHTML = html;
}
</script>

</body>
</html>
